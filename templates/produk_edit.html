{% extends "base.html" %}
{% block title %}Edit Produk - EntokMart{% endblock %}
{% block content %}
<h2 class="mb-4">Edit Produk</h2>
<div class="card">
    <div class="card-body">
        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label">Nama Entok</label>
                <input type="text" name="name" class="form-control" value="{{ product.name }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Kategori</label>
                <select name="jenis" class="form-select" required>
                    {% for cat in categories %}
                    <option value="{{ cat.slug }}" {% if product.jenis == cat.slug %}selected{% endif %}>{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Berat (kg)</label>
                    <input type="number" name="berat_kg" class="form-control" value="{{ product.berat_kg }}" step="0.1" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Harga (Rp)</label>
                    <input type="number" name="harga" class="form-control" value="{{ product.harga }}" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Stok</label>
                    <input type="number" name="stok" class="form-control" value="{{ product.stok }}" min="0" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Deskripsi</label>
                <textarea name="deskripsi" class="form-control" rows="3">{{ product.deskripsi or '' }}</textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Gambar</label>
                {% if product.image_url %}
                <div class="mb-2">
                    <img src="{{ product.image_url }}" class="img-thumbnail" style="max-height: 150px;">
                </div>
                {% endif %}
                <input type="file" name="image" class="form-control" accept="image/*">
                <div class="form-text">Format: JPG, PNG, GIF (max 16MB). Kosongkan jika tidak diganti.</div>
            </div>
            <div class="mb-3">
                <label class="form-label">URL Gambar</label>
                <input type="url" name="image_url" class="form-control" value="{{ product.image_url or '' }}">
            </div>
            <button type="submit" class="btn btn-entok">Update</button>
            <a href="/dashboard-peternak" class="btn btn-outline-secondary ms-2">Batal</a>
        </form>
    </div>
</div>
{% endblock %}
