{% extends "base.html" %}
{% block title %}Daftar - EntokMart{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card p-4">
            <div class="text-center mb-4">
                <i class="bi bi-shop" style="font-size: 3rem; color: var(--primary);"></i>
                <h3 class="mt-3 fw-bold">Buat Akun</h3>
                <p class="text-muted">Daftar sekarang dan mulai berjualan</p>
            </div>
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="namaanda" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" placeholder="email@example.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Daftar sebagai</label>
                    <select name="role" class="form-select" required>
                        <option value="buyer">Pembeli (Saya ingin membeli)</option>
                        <option value="peternak">Peternak (Saya ingin menjual)</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-entok w-100 py-2">Daftar Sekarang</button>
            </form>
            <p class="text-center mt-4 mb-0">
                Sudah punya akun? <a href="/login" class="text-primary fw-bold">Login</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
