{% extends "base.html" %}
{% block title %}Review Produk - EntokMart{% endblock %}
{% block content %}
<h2 class="mb-4"><i class="bi bi-star"></i> Beri Review</h2>

<div class="card" style="max-width: 600px;">
    <div class="card-header bg-white">
        <h5 class="mb-0">{{ product.name }}</h5>
        <small class="text-muted">{{ product.jenis }} | {{ product.berat_kg }} kg</small>
    </div>
    <div class="card-body">
        <form method="POST">
            <div class="mb-4">
                <label class="form-label fw-bold">Rating</label>
                <div class="rating-input">
                    {% for i in range(5, 0, -1) %}
                    <input type="radio" name="rating" value="{{ i }}" id="star{{ i }}" required>
                    <label for="star{{ i }}" class="star-label"><i class="bi bi-star fs-2"></i></label>
                    {% endfor %}
                </div>
                <style>
                    .rating-input { display: flex; gap: 5px; flex-direction: row-reverse; }
                    .rating-input input { display: none; }
                    .rating-input label { cursor: pointer; color: #ddd; transition: 0.2s; }
                    .rating-input input:checked ~ label,
                    .rating-input label:hover ~ label,
                    .rating-input label:hover { color: #ffc107; }
                </style>
            </div>
            <div class="mb-3">
                <label class="form-label">Komentar (opsional)</label>
                <textarea name="komentar" class="form-control" rows="4" placeholder="Share pengalaman Anda..."></textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-entok">
                    <i class="bi bi-send"></i> Kirim Review
                </button>
                <a href="/" class="btn btn-outline-secondary">Batal</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
