{% extends "base.html" %}
{% block title %}Reset Password - EntokMart{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body">
                <h3 class="mb-4 text-center"><i class="bi bi-key"></i> Reset Password</h3>
                
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">Password Baru</label>
                        <input type="password" name="password" class="form-control" minlength="6" required>
                        <small class="text-muted">Minimal 6 karakter</small>
                    </div>
                    <button type="submit" class="btn btn-entok w-100">Simpan Password</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
