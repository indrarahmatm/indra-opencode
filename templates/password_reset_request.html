{% extends "base.html" %}
{% block title %}Lupa Password - EntokMart{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body">
                <h3 class="mb-4 text-center"><i class="bi bi-key"></i> Lupa Password</h3>
                <p class="text-muted">Masukkan email untuk reset password.</p>
                
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-entok w-100">Kirim Link Reset</button>
                </form>
                <div class="mt-3 text-center">
                    <a href="{{ url_for('login') }}">Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
