{% extends "base.html" %}
{% block title %}Lupa Password - EntokMart{% endblock %}
{% block content %}
<h2 class="mb-4"><i class="bi bi-key"></i> Lupa Password</h2>

<div class="card" style="max-width: 500px;">
    <div class="card-body">
        <p class="text-muted mb-3">Masukkan email Anda untuk menerima link reset password.</p>
        <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-entok w-100">Kirim Link Reset</button>
        </form>
        <hr>
        <p class="text-center mb-0">
            <a href="{{ url_for('login') }}">Ingat password? Login di sini</a>
        </p>
    </div>
</div>
{% endblock %}
