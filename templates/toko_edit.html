{% extends "base.html" %}
{% block title %}Edit Toko - EntokMart{% endblock %}
{% block content %}
<h2 class="mb-4"><i class="bi bi-shop"></i> Edit Toko</h2>

<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">Nama Toko</label>
                        <input type="text" name="nama_toko" class="form-control" value="{{ current_user.nama_toko or '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Deskripsi Toko</label>
                        <textarea name="deskripsi_toko" class="form-control" rows="3">{{ current_user.deskripsi_toko or '' }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">No. HP</label>
                        <input type="text" name="no_hp" class="form-control" value="{{ current_user.no_hp or '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Alamat</label>
                        <textarea name="alamat" class="form-control" rows="2">{{ current_user.alamat or '' }}</textarea>
                    </div>
                    <button type="submit" class="btn btn-entok">Simpan</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
