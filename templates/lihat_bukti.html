{% extends "base.html" %}
{% block title %}Bukti Transfer - EntokMart{% endblock %}
{% block content %}
<h2 class="mb-4"><i class="bi bi-receipt"></i> Bukti Transfer - Order #{{ order.id }}</h2>

<div class="card">
    <div class="card-body text-center">
        <p class="mb-3">Total: <strong>Rp {{ "{:,}".format(order.total_harga) }}</strong></p>
        {% if order.transfer_proof_url %}
        <img src="{{ order.transfer_proof_url }}" class="img-fluid rounded" style="max-width: 100%; max-height: 500px;">
        {% else %}
        <p class="text-muted">Bukti tidak ditemukan</p>
        {% endif %}
    </div>
    <div class="card-footer bg-white">
        <a href="{{ url_for('pesanan') }}" class="btn btn-outline-secondary">Kembali</a>
    </div>
</div>
{% endblock %}
