{% extends "base.html" %}
{% block title %}Login - EntokMart{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card p-4">
            <div class="text-center mb-4">
                <i class="bi bi-shop" style="font-size: 3rem; color: var(--primary);"></i>
                <h3 class="mt-3 fw-bold">Masuk ke EntokMart</h3>
                <p class="text-muted">Silakan login untuk melanjutkan</p>
            </div>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" placeholder="email@example.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-entok w-100 py-2">Login</button>
            </form>
            <p class="text-center mt-4 mb-0">
                Belum punya akun? <a href="/register" class="text-primary fw-bold">Daftar</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
