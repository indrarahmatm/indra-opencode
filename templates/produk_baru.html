{% extends "base.html" %}
{% block title %}Tambah Produk - EntokMart{% endblock %}
{% block content %}
<h2 class="mb-4">Tambah Produk Entok</h2>
<div class="card">
    <div class="card-body">
        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label">Nama Entok</label>
                <input type="text" name="name" class="form-control" placeholder="Contoh: Entok Manila" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Jenis</label>
                <select name="jenis" class="form-select" required>
                    <option value="entok muda">Entok Muda (Bibit)</option>
                    <option value="entok afkir">Entok Afkir (Dewasa)</option>
                    <option value="entok培">Entok培 (Pandet)</option>
                </select>
            </div>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Berat (kg)</label>
                    <input type="number" name="berat_kg" class="form-control" step="0.1" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Harga (Rp)</label>
                    <input type="number" name="harga" class="form-control" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Stok</label>
                    <input type="number" name="stok" class="form-control" value="0" min="0" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Deskripsi</label>
                <textarea name="deskripsi" class="form-control" rows="3" placeholder="Kondisi, kesehatan, dll"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Gambar (opsional)</label>
                <input type="file" name="image" class="form-control" accept="image/*">
                <div class="form-text">Format: JPG, PNG, GIF (max 16MB)</div>
            </div>
            <div class="mb-3">
                <label class="form-label">URL Gambar (opsional)</label>
                <input type="url" name="image_url" class="form-control" placeholder="https://...">
            </div>
            <button type="submit" class="btn btn-entok">Simpan</button>
            <a href="/dashboard-peternak" class="btn btn-outline-secondary ms-2">Batal</a>
        </form>
    </div>
</div>
{% endblock %}
